services:
  - type: web
    name: job-copilot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./jobcopilot.db
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080